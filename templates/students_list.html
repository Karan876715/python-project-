<!DOCTYPE html>
<html>
<head>
    <title>Registered Students</title>
    <style>
        body {font-family: 'Segoe UI', Arial; text-align:center; padding:30px; background:#e8f5e9;}
       .container {width: 40%; max-width:500px; margin: auto; background:white; padding:25px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        h2 {color: #28a745; font-weight: 800;}
        table {border-collapse: collapse; width: 100%; margin: 20px auto; font-size:16px;}
        th, td {border: 1px solid #ddd; padding: 12px; text-align: center;}
        th {background: linear-gradient(90deg, #28a745, #20c997); color: white; font-weight: bold;}
       .btn-home {background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; margin:10px; display:inline-block; font-weight:bold;}
    </style>
</head>
<body>
    <div class="container">
        <h2><b>Registered Students List</b></h2>
        {% if students %}
        <table>
            <tr>
                <th><b>Sr.No</b></th> 
                <th><b>User Name</b></th> 
            </tr>
            {% for s in students %}
            <tr>
                <td><b>{{ loop.index }}</b></td> 
                <td><b>{{ s.name }}</b></td> 
            </tr>
            {% endfor %}
        </table>
        {% else %} 
        <p><b>No users found</b></p> 
        {% endif %}
        <a href="/" class="btn-home">Back to Home</a>
    </div>
</body>
</html>

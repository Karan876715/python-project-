<!DOCTYPE html>
<html>
<head>
<title>New Admission</title>
<style>
    * {margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
    body {
        height:100vh;
        background: url('https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=1200') no-repeat center fixed;
        background-size: cover;
        display:flex; justify-content:center; align-items:center;
    }
    .form-card {
        background: rgba(255,255,255,0.96); 
        width: 380px; 
        padding: 20px 25px;
        border-radius: 8px; 
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    h2 {
        text-align: center; 
        color: #222; 
        margin-bottom: 15px;
        font-size: 20px;
        font-weight: 600;
    }
    label {
        display: block; 
        margin-top: 10px; 
        font-size: 12px; 
        font-weight: 500;
        color:#444;
    }
    input {
        width: 100%; 
        padding: 8px; 
        margin-top: 4px;
        border: 1px solid #ddd; 
        border-radius: 4px;
        font-size: 13px;
        background: #fff;
    }
    input:focus {outline: 1px solid #2f4fff;}
    .btn-submit {
        width: 100%; 
        padding: 11px; 
        margin-top: 18px;
        background: #2f4fff; 
        color: white; 
        border: none;
        border-radius: 5px; 
        font-weight: bold; 
        cursor: pointer;
        font-size: 14px;
    }
    .btn-submit:hover {background: #1a2fcc;}
    input[type="file"]{padding: 5px; font-size:12px;}
</style>
</head>
<body>
<div class="form-card">
    <h2>New Admission</h2>
    <form method="POST" enctype="multipart/form-data">
        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>College Name</label>
        <input type="text" name="college" required>

        <label>Enrollment Number</label>
        <input type="text" name="enroll" required>

        <label>Mobile No</label>
        <input type="text" name="mobile" required>

        <label>Address</label>
        <input type="text" name="address">

        <label>Gmail ID</label>
        <input type="email" name="email" required>

        <label>Course co-5k / co-6k / etc</label>
        <input type="text" name="course" required>

        <label>Date of Birth DD-MM-YYYY</label>
        <input type="date" name="dob" required>

      

        <button type="submit" class="btn-submit">Submit</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Our Students</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; text-align: center; }
       .card {
            display: inline-block;
            margin: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            width: 200px;
        }
       .card img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* gol DP sathi */
            object-fit: cover;
        }
       .card h3 { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Our Students</h1>
    {% for student in students %}
    <div class="card">
        <img src="{{ url_for('static', filename=student[1].replace('static\\','').replace('static/','')) }}" alt="DP">
        <h3>{{ student[0] }}</h3>
    </div>
    {% endfor %}
</body>
</html>

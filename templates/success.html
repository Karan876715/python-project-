<!DOCTYPE html>
<html>
<head>
    <title>Congratulations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=1200') no-repeat center center fixed; /* HE LINE IMPORTANT */
            background-size: cover;
            font-family: 'Segoe UI', Arial;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.97); /* Thoda transparent */
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(4px); /* Mage blur effect */
        }
        .dp {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
            margin-bottom: 10px;
        }
        .congo {
            color: #28a745;
            font-size: 20px;
            font-weight: 700;
        }
        h3 { 
            color: #333; 
            font-size: 16px;
            font-weight: 500;
            margin: 5px 0 10px 0;
        }
        .welcome { color: #555; font-size: 14px; margin-bottom: 15px; }
        .welcome b { color: #000; }
        .login-box { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: left; 
            margin: 15px 0;
        }
        .login-box p { margin: 6px 0; font-size: 14px; color: #333; }
        .btn { 
            width: 100%; 
            padding: 12px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            text-decoration: none;
            display: block;
            cursor: pointer;
        }
        .btn:hover { background: #218838; }
        .note { font-size: 12px; color: #666; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ photo }}" class="dp" alt="DP">
        <p class="congo">🎉 CONGRATULATIONS 🎉</p>
        <h3>Admission Success!</h3>
        <p class="welcome">Welcome, <b>{{ name }}</b></p>

        <p style="text-align: left; font-weight: bold; margin-bottom: 5px;">Tuzha Private Login:</p>
        <div class="login-box">
            <p><b>Username:</b> {{ name }}</p>
            <p><b>Gmail:</b> {{ gmail }}</p>
            <p><b>Password:</b> {{ password }}</p>
        </div>

        <p class="note">Ha password sambhalun thev. Yane tu swatachi list baghu shakto.</p>
        <a href="/student_login" class="btn">Login</a>
    </div>
</body>
</html>

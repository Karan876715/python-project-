<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body {margin: 0; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.pexels.com/photos/267392/pexels-photo-267392.jpeg?auto=compress&cs=tinysrgb&w=1920') no-repeat center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; height: 100vh;}
    .login-box {background: rgba(255,255,255,0.97); padding: 40px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6);}
        h2 {color: #004aad;}
        input {width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc;}
        button {width: 95%; padding: 12px; background: #004aad; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>STUDENT LOGIN</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Enter Your Name" required>
            <input type="text" name="birthday" placeholder="Enter Birthday DD-MM-YYYY" required>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>

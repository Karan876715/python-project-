<!DOCTYPE html>
<html>
<head>
    <title>ADMIN PANEL</title>
    <style>
        body {background: url('https://images.pexels.com/photos/267392/pexels-photo-267392.jpeg?auto=compress&cs=tinysrgb&w=1920') no-repeat center fixed; background-size: cover; padding: 30px;}
  .container {background: rgba(255,255,255,0.98); padding: 30px; border-radius: 20px; max-width: 1400px; margin: auto; overflow-x: auto;}
        h2 {color: #004aad; text-align: center;}
        table {width: 100%; border-collapse: collapse;}
        th {background: #004aad; color: white; padding: 12px; font-size: 12px;}
        td {padding: 10px; text-align: center; border-bottom: 1px solid #ddd; font-size: 12px;}
        a {display: block; width: 200px; margin: 30px auto 0; padding: 12px; background: #004aad; color: white; text-decoration: none; border-radius: 8px; text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <h2>ADMIN PANEL - ALL STUDENT DATA</h2>
        <table>
            <tr>
                <th>ID</th><th>NAME</th><th>COLLEGE</th><th>ENROLLMENT</th>
                <th>PHONE</th><th>ADDRESS</th><th>GMAIL</th><th>COURSE</th><th>BIRTHDAY</th>
            </tr>
            {% for s in students %}
            <tr>
                <td>{{ s[0] }}</td><td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td><td>{{ s[5] }}</td><td>{{ s[6] }}</td><td>{{ s[7] }}</td><td>{{ s[8] }}</td>
            </tr>
            {% endfor %}
        </table>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online College Admission Portal</title>
<style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif;}
    
    body {
        height:100vh;
        background: url('/static/bg.jpg') no-repeat center center fixed; /* Tujha college bg */
        background-size: cover;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .card {
        background: rgba(255, 255, 255, 0.95);
        width: 400px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        text-align: center;
    }

    .logo {
        width: 60px;
        height: 60px;
        margin: 0 auto 10px;
        background: #ff6b35;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
    }

    h2 {
        color: #1a237e;
        margin-bottom: 5px;
    }

    .subtitle {
        color: #555;
        font-size: 13px;
        margin-bottom: 15px;
    }

    p {
        color: #333;
        margin-bottom: 20px;
        font-size: 14px;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
    }

    .btn-blue {background: #2962ff;}
    .btn-orange {background: #ff9100;}
    .btn-green {background: #00c853;}
    .btn-red {background: #d50000;}

    .btn:hover {opacity: 0.9;}
</style>
</head>
<body>

<div class="card">
    <div class="logo">📚</div>
    <h2>Online College Admission Portal</h2>
    <div class="subtitle">OCAP - Your Gateway to Higher Education</div>
    <p>Welcome! Krupaya khali option paiki ek nivada</p>

    <a href="/" class="btn btn-blue">New Admission Form</a>
    <a href="/students" class="btn btn-orange">Registered Students List</a>
    <a href="/student_login" class="btn btn-green">Student Login</a>
    <a href="/admin_login" class="btn btn-red">Admin Login</a>
</div>

</body>
</html>
